<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Same CSP the app itself runs under (mermaid renders fine within it). -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:">
  <title>Projector — Shared</title>
  <link rel="stylesheet" href="/app.css">
  <!-- Phones only: zoom the whole viewer down so a board/timeline fits the small
       screen instead of needing constant panning. The app boosts the UI with
       html{zoom:1.2} for the desktop window; 0.864 is ~72% of that (~20% larger
       than the previous 0.72). Inline + media-query here so it touches only this
       served page (never the app) and only narrow screens (a laptop opening the
       link keeps the full-size view). -->
  <style>
    @media (max-width: 640px) { html { zoom: 0.864; } }
  </style>
</head>
<body class="share-view no-hover">
  <div id="app">
    <!-- Top bar: shared title + the same Task List / Timeline / Team toggle. -->
    <div id="toolbar">
      <div id="share-title" class="share-title"></div>

      <div id="view-toggle" hidden>
        <button class="seg-btn active" data-view="kanban">
          <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
            <rect x="1"  y="2" width="4" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/>
            <rect x="6"  y="2" width="4" height="8"  rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/>
            <rect x="11" y="2" width="4" height="5"  rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          Task List
        </button>
        <button class="seg-btn" data-view="gantt">
          <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
            <rect x="1" y="2"  width="8"  height="3" rx="1.5" fill="currentColor"/>
            <rect x="5" y="6.5" width="9"  height="3" rx="1.5" fill="currentColor"/>
            <rect x="3" y="11" width="6"  height="3" rx="1.5" fill="currentColor"/>
          </svg>
          Timeline
        </button>
        <button class="seg-btn" data-view="team">
          <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
            <circle cx="5.5" cy="5" r="2.4" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="11"  cy="6" r="1.9" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <path d="M1.6 13c0-2.2 1.7-3.6 3.9-3.6S9.4 10.8 9.4 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M10.2 9.6c2 .1 4.2 1 4.2 3.4" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Team
        </button>
      </div>

      <div id="drag-space"></div>
      <div class="share-badge"><span class="share-dot"></span>Live view</div>
    </div>

    <!-- Main view area (no sidebar) -->
    <main id="main">
      <div id="empty-state" class="centered">
        <div class="empty-inner">
          <div class="empty-title">Connecting…</div>
          <div class="empty-detail">Loading the shared view.</div>
        </div>
      </div>

      <div id="kanban" hidden></div>
      <div id="team" hidden></div>

      <div id="gantt" hidden>
        <div class="gantt-toolbar">
          <div class="gantt-zoom">
            <button id="gantt-zoom-out" title="Zoom out">−</button>
            <button id="gantt-zoom-label" title="Reset zoom">100%</button>
            <button id="gantt-zoom-in" title="Zoom in">+</button>
          </div>
        </div>
        <div class="gantt-scroll"><div id="gantt-render"></div></div>
      </div>

      <div id="global" hidden>
        <div id="global-kanban" hidden></div>
        <div id="global-team" hidden></div>
        <div id="global-gantt" hidden>
          <div class="gantt-toolbar">
            <div class="gantt-zoom">
              <button id="g-zoom-out" title="Zoom out">−</button>
              <button id="g-zoom-label" title="Reset zoom">100%</button>
              <button id="g-zoom-in" title="Zoom in">+</button>
            </div>
          </div>
          <div class="gantt-scroll"><div id="global-gantt-render"></div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- The exact same view-modules the app uses, served read-only. -->
  <script src="/lib/mermaid.min.js"></script>
  <script src="/lib/palette.js"></script>
  <script src="/lib/gantt-parse.js"></script>
  <script src="/lib/kanban.js"></script>
  <script src="/lib/gantt.js"></script>
  <script src="/lib/team.js"></script>
  <script src="/lib/global.js"></script>
  <script src="/lib/viewer.js"></script>
</body>
</html>
